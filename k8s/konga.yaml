apiVersion: apps/v1
kind: Deployment
metadata:
  name: konga
  namespace: fusion
  labels:
    app: konga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: konga
  template:
    metadata:
      labels:
        app: konga
    spec:
      containers:
      - name: konga
        image: pantsel/konga:0.14.9
        env:
        - name: DB_ADAPTER
          value: "postgres"
        - name: DB_HOST
          value: "kong-db"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: "kong"
        - name: DB_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: fusion-config
              key: DB_PASSWORD
        - name: DB_DATABASE
          value: "fusion_master"
        - name: NODE_ENV
          value: "production"
        ports:
        - containerPort: 1337
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /
            port: 1337
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 1337
          initialDelaySeconds: 60
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: konga
  namespace: fusion
  labels:
    app: konga
spec:
  ports:
  - port: 1337
    targetPort: 1337
    protocol: TCP
  selector:
    app: konga
  type: LoadBalancer