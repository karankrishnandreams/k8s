_format_version: "3.0"

consumers:
  - username: fusion_consumer
    custom_id: fusion_consumer

jwt_secrets:
  - consumer: fusion_consumer
    key: fusion_consumer
    algorithm: HS256
    secret: 98893a20fb8704f38367e2e70ae2c80a7dc13843f1890c751228d9abf5f02421

services:
  - name: qa-user-service
    url: http://host.docker.internal:6001
    routes:
      - name: user-public-route
        paths:
          - /user/public
        methods: [GET, POST, OPTIONS]
        strip_path: true

      - name: user-secure-route-qa
        paths:
          - /user
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        strip_path: true
        plugins:
          - name: jwt
            config:
              run_on_preflight: true
              claims_to_verify: [exp]
              maximum_expiration: 7200

  - name: qa-email-service
