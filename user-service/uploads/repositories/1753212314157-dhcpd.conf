# DHCP server is authoritative for all networks

# extra options
# RFC3442 routes
#option rfc3442-classless-static-routes code 121 = array of integer 8;
# MS routes
#option ms-classless-static-routes code 249 = array of integer 8;
# Cisco IP phones
#option voip-tftp-servers code 150 = array of ip-address;
#option shoretel-director-server code 155 = ip-address;

pid-file-name "/var/run/dhcp-server/dhcpd.pid";

ddns-update-style none;

#allow booting;
#allow bootp;

#default-lease-time 86400;
#max-lease-time 86400;

shared-network eno1 {
	# alta.net main
	subnet 192.168.0.0 netmask 255.255.240.0 {
		authoritative;
		option domain-name-servers 192.168.1.33 , 192.168.1.52 , 192.168.1.5;
		range 192.168.5.1 192.168.14.254;
		server-name "ALTA-DHCPDNS-01";
		option routers 192.168.1.1;
		option domain-name "alta.net";
		option domain-search "alta.net";
		option netbios-name-servers 192.168.1.33 , 192.168.1.52;
		option netbios-node-type 8;
		default-lease-time 43200;
		max-lease-time 43200;
		}
	}
